name: CI

on:
  schedule:
    - cron: "0 20 * * *"
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          ruby \
          qmake6 \
          libqt6core6 \
          libqt6gui6 \
          libqt6svg6-dev \
          libqt6core5compat6-dev \
          zlib1g-dev \
          libzstd-dev \
          libgl1-mesa-dev \
          libssl-dev \
          qt6-base-dev \
          qt6-svg-dev \
          libcurl4-openssl-dev \
          mecab-utils
          
    - name: Prepare environment
      run: ruby prepare.rb
      
    - name: Build libfiletype
      run: |
        cd filetype
        bash build-gcc.sh
        ls -la lib
        cd ..

    - name: Build incrementalsearchPlugin
      run: |
        cd subprojects/IncrementalSearchPlugin
        rm -fr build
        mkdir build
        cd build
        qmake6 ../IncrementalSearchPlugin.pro
        make
        cd ../../../_bin
        ls libincrementalsearchplugin.so
        cd ..
        
    - name: Build Guitar
      run: |
        rm -fr _build
        mkdir _build
        cd _build
        qmake6 "CONFIG+=release" ../Guitar.pro
        make -j$(nproc)
        
    - name: Test build
      run: |
        ls -la _bin/
        file _bin/Guitar
        
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: guitar-linux-amd64
        path: _bin/Guitar

